<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python Lecture 02 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1f2e;--s1:#222840;--s2:#2a3352;--border:#334066;
  --pink:#e8a0b0;--lav:#9b8fc7;--mint:#7ec8a4;--amber:#e8c080;
  --text:#e8eaf6;--muted:#7080a8;--correct:#7ec8a4;--wrong:#e08888;
  --mint-d:rgba(126,200,164,.13);--amber-d:rgba(232,192,128,.13);
  --lav-d:rgba(155,143,199,.13);
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:16px 14px 60px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;line-height:1.3}
.streak{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--amber)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:9px 4px;text-align:center}
.sv{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500;color:var(--text);display:block}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:1px;display:block}
.prog-wrap{margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.prog-track{height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--lav),var(--pink));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.q-grid-wrap{margin-bottom:14px}
.q-grid-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:7px}
.q-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.qb{font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;padding:7px 0;border-radius:9px;border:1.5px solid #4a5580;background:var(--s2);color:#b0b8d8;cursor:pointer;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.qb:hover{color:#ffffff;border-color:var(--lav);background:#2e3660;box-shadow:0 0 14px rgba(155,143,199,.7),0 0 28px rgba(155,143,199,.35)}
.qb.cur{border-color:var(--lav);background:var(--lav);color:#fff;box-shadow:0 0 10px rgba(155,143,199,.35)}
.qb.done{border-color:var(--mint);background:var(--mint-d);color:var(--mint)}
.qb.err{border-color:var(--wrong);background:rgba(224,136,136,.1);color:var(--wrong)}
.qb.hint{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
.card{background:var(--s1);border:1px solid rgba(155,143,199,.45);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 0 18px rgba(155,143,199,.3),0 0 36px rgba(155,143,199,.12)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lav),var(--pink))}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--lav)}
.q-info{font-size:10px;background:var(--lav-d);border:1px solid rgba(155,143,199,.2);border-radius:100px;padding:2px 9px;color:var(--muted);font-weight:700}
.q-solve{font-size:10px;background:rgba(232,192,128,.15);border:1px solid rgba(232,192,128,.25);border-radius:100px;padding:2px 9px;color:var(--amber);font-weight:700}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:14px;font-weight:600;padding-bottom:13px;border-bottom:1px solid var(--border)}
.a-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mint);margin-bottom:11px}
.a-text{font-size:15px;color:var(--text);line-height:2.9}
.bw{display:inline-block;vertical-align:middle;margin:0 1px}
.bw-inp{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;background:var(--s2);border:2px solid var(--lav);border-radius:8px;color:var(--text);padding:3px 7px;outline:none;text-align:center;-webkit-appearance:none;appearance:none;transition:border-color .15s,background .15s,color .15s}
.bw-inp:focus{border-color:var(--pink);background:#2e3560}
.bw-inp.ok{border-color:var(--correct) !important;background:var(--mint-d) !important;color:var(--correct) !important}
.bw-inp.bad{animation:sh .3s ease}
.bw-inp.shown{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.fb{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.fb.show{display:flex}
.fb.ok{background:var(--mint-d);border:1px solid rgba(126,200,164,.3);color:var(--correct)}
.fb.info{background:var(--lav-d);border:1px solid rgba(155,143,199,.3);color:var(--lav)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn{font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;padding:13px 12px;border-radius:14px;border:none;cursor:pointer;transition:all .2s;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
.btn-next{background:var(--mint);color:#0d2018;width:100%;margin-bottom:8px;transition:all .2s}
.btn-next:hover{box-shadow:0 0 14px rgba(126,200,164,.5),0 0 28px rgba(126,200,164,.25);filter:brightness(1.1)}
.btn-next:active{transform:scale(.97)}
.btn-sm{background:var(--s2);color:#b0b8d8;border:1px solid #4a5580;font-size:13px;padding:11px 8px;transition:all .2s}
.btn-sm:hover{color:#fff;border-color:var(--lav);background:#2e3660;box-shadow:0 0 14px rgba(155,143,199,.45),0 0 28px rgba(155,143,199,.2)}
.btn-sm:active{color:var(--text);transform:scale(.97)}
.finish{display:none;text-align:center;padding:32px 12px}
.finish.show{display:block}
.fi{font-size:52px;margin-bottom:12px;animation:pop .6s ease}
@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.ft{font-size:26px;font-weight:700;color:var(--mint);margin-bottom:6px}
.fs{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sc .sv{font-size:26px;color:var(--mint)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="brand">Python Lecture 02<br>Python Fundamentals & Workbench</span>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="exportPNG()" style="font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:100px;border:1px solid #4a5580;background:#222840;color:#b0b8d8;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;transition:all .2s" onmouseover="this.style.color='#fff';this.style.borderColor='#9b8fc7';this.style.background='#2e3660';this.style.boxShadow='0 0 12px rgba(155,143,199,.45)'" onmouseout="this.style.color='#b0b8d8';this.style.borderColor='#4a5580';this.style.background='#222840';this.style.boxShadow='none'">📊 Export your grade</button>
      <span class="streak">🔥 <span id="streak">0</span></span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><span class="sv" id="s-done">0</span><span class="sl">Done</span></div>
    <div class="stat"><span class="sv" id="s-perf">0</span><span class="sl">Perfect</span></div>
    <div class="stat"><span class="sv" id="s-hint">0</span><span class="sl">Hints</span></div>
    <div class="stat"><span class="sv" id="s-best">0</span><span class="sl">Best🔥</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-row"><span>Progress</span><span id="prog-txt">0 / 18</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="q-grid-wrap">
    <div class="q-grid-label">Select question</div>
    <div class="q-grid" id="q-grid"></div>
  </div>
  <div id="quiz-area">
    <div class="card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-info" id="q-info"></span>
        <span class="q-solve" id="q-solve"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="a-label">10 blanks — turns green when correct</div>
      <div class="a-text" id="a-text"></div>
    </div>
    <div class="fb" id="fb"></div>
    <div id="next-row" style="display:none">
      <button class="btn btn-next" onclick="nextQ()">Next question →</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-sm" onclick="showAns()">Show answers</button>
      <button class="btn btn-sm" onclick="resetQ()">↻ Reset (new blanks)</button>
    </div>
  </div>
  <div class="finish" id="finish">
    <div class="fi">🌸</div>
    <div class="ft">All 18 done!</div>
    <div class="fs" id="f-sub"></div>
    <div class="sg">
      <div class="sc"><span class="sv" id="f-p">0</span><span class="sl">Perfect</span></div>
      <div class="sc"><span class="sv" id="f-h">0</span><span class="sl">Hints</span></div>
      <div class="sc"><span class="sv" id="f-b">0</span><span class="sl">Best streak</span></div>
      <div class="sc"><span class="sv" id="f-pct">0%</span><span class="sl">Accuracy</span></div>
    </div>
    <button class="btn btn-next" onclick="restart()">Start over 🌸</button>
  </div>
</div>
<script>
const QS=[
  {q:"What type of programming language is Python?",
   full:"Python is a [[high-level]], [[general-purpose]] [[programming]] [[language]]."},
  {q:"Who designed Python, and who develops it?",
   full:"Python was [[designed]] by [[Guido]] [[van]] [[Rossum]]. The [[developer]] is the [[Python]] [[Software]] [[Foundation]]."},
  {q:"When did Python first appear, and on which operating systems does it run?",
   full:"Python [[first]] [[appeared]] on [[20]] [[February]] [[1991]]. It runs on [[Windows]], [[macOS]], [[Linux]]/[[UNIX]], [[Android]], [[FreeBSD]], and [[NetBSD]]."},
  {q:"List the reasons why Python is so popular.",
   full:"Python is [[free]], [[beginner]]-[[friendly]], has a [[simplified]] [[English]]-like [[syntax]], is a [[general]]-[[purpose]] [[language]], can be used for [[numerous]] [[tasks]], has a [[matured]] [[community]], and a large collection of [[Libraries]] and [[Frameworks]]."},
  {q:"Name at least eight use cases for Python.",
   full:"Python can be used for [[data]] [[analysis]], [[web]] [[development]], [[machine]] [[learning]], [[DevOps]], [[system]] [[administration]], [[automation]] [[scripts]], [[web]] [[scrapers]], [[software]] [[testing]], and [[educational]] [[purposes]]."},
  {q:"Name all ten Python libraries/frameworks mentioned and their purposes.",
   full:"[[NumPy]] ([[computing]]), [[Pandas]] ([[data]]), [[Matplotlib]] ([[visualization]]), [[SciPy]] ([[computing]]), [[Plotly]] ([[visualization]]), [[Scikit-Learn]] ([[machine]] [[learning]]), [[TensorFlow]] ([[deep]] [[learning]]), [[Keras]] ([[deep]] [[learning]]), [[Seaborn]] ([[visualization]]), [[PyTorch]] ([[machine]] [[learning]])."},
  {q:"What version of Python is required for this course, and what commands check the Python version?",
   full:"You should have [[Python]] [[3.8]] or [[later]] installed. On Windows: [[py]] [[--version]], [[python]] [[--version]], or [[python3]] [[--version]]. On Mac/Linux: [[python3]] [[-version]] or [[python]] [[--version]]."},
  {q:"What does REPL stand for, and what does each step do?",
   full:"REPL stands for [[Read]], [[Evaluate]], [[Print]], and [[Loop]]. It [[reads]] your Python commands, [[evaluates]] your code, [[prints]] the results, and [[loops]] back to read again."},
  {q:"What is the difference between an IDE and a Lightweight Editor?",
   full:"An [[IDE]] (Integrated Development Environment) is not only a code [[editor]] but a project [[Development]] [[Environment]] with many other [[features]]. [[Lightweight]] [[Editors]] are used to open and edit [[files]] [[individually]], and are [[fast]] and [[easy]] to handle."},
  {q:"Name the three text editors covered in the lecture with their platform and cost.",
   full:"[[PyCharm]] ([[cross]]-[[platform]], [[shareware]]), [[Visual]] [[Studio]] [[Code]] ([[cross]]-[[platform]], [[free]]), and [[Notepad]]++ ([[Windows]], [[free]])."},
  {q:"What are the three prerequisites for getting started with Python in VS Code?",
   full:"The three prerequisites are [[Python]] [[3]], [[VS]] [[Code]], and the [[VS]] [[Code]] [[Python]] [[extension]]. The [[Code]] [[Runner]] [[extension]] is also recommended."},
  {q:"What does the VS Code Python extension provide?",
   full:"The VS Code Python extension provides [[IntelliSense]] ([[Pylance]]), [[Linting]], [[Debugging]] (multi-threaded, remote), code [[formatting]], [[refactoring]], [[variable]] [[explorer]], [[test]] [[explorer]], and more. It was made by [[Microsoft]]."},
  {q:"What is Code Runner and who made it?",
   full:"[[Code]] [[Runner]] is a VS Code extension by [[Jun]] [[Han]] that can run code in C, C++, Java, JavaScript, PHP, [[Python]], Perl, Ruby, Go, Lua, and [[Groovy]]. It has over [[23]] million [[installs]]."},
  {q:"How do you select the Python interpreter in VS Code?",
   full:"In VS Code, open the [[Command]] [[Palette]] with [[Ctrl]]+[[Shift]]+[[P]], search for [[Python]]: [[Select]] [[Interpreter]], then choose the [[Recommended]] Python version (e.g., [[Python]] [[3.12]] [[64-bit]])."},
  {q:"What working folder structure is recommended, and where should it be created?",
   full:"Create a main [[working]] [[folder]] (e.g., [[Python_Workings]]) on a [[Flash]] [[Drive]] (USB memory stick). Within it, create [[subfolders]] for each lecture: [[Lecture_03]] through [[Lecture_14]] plus [[ZZZ_Bin]]."},
  {q:"How do you link the working folder in VS Code, and how often must you do it?",
   full:"In VS Code, click [[Open]] [[Folder]], [[select]] the [[Working]] [[Folder]], then click [[Yes]], [[I]] [[trust]] the authors. On your own [[machine]], do this only [[once]]. On [[APU]] [[computers]], link it every [[session]]."},
  {q:"Where are Python and VS Code downloaded from?",
   full:"Python is downloaded from [[https://www.python.org/downloads/]]. VS Code is downloaded from [[https://code.visualstudio.com/Download]]."},
  {q:"What are the two homework tasks after Lecture 2?",
   full:"First, [[revise]] this Lecture Note (~10 min) to fill [[gaps]], increase [[retention]], and transfer information from [[short-term]] to [[long-term]] [[memory]]. Second, [[read]] the next Lecture Note (~10 min) to [[prepare]] for the next [[class]]."}
];
const BLANK_COUNT=10;
let cur=0,streak=0,best=0,perfects=0;
let doneSet=new Set(),hintSet=new Set(),errSet=new Set();
let solveCount=JSON.parse(localStorage.getItem('py02_solve')||'[]');
if(solveCount.length<18)solveCount=new Array(18).fill(0);

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function parseQ(full){
  const parts=[];const re=/\[\[(.+?)\]\]/g;let last=0,m;
  while((m=re.exec(full))!==null){
    if(m.index>last)parts.push({type:'text',content:full.slice(last,m.index)});
    parts.push({type:'key',word:m[1]});last=re.lastIndex;
  }
  if(last<full.length)parts.push({type:'text',content:full.slice(last)});
  return parts;
}

function loadQ(idx){
  cur=idx;
  const q=QS[idx];
  const parts=parseQ(q.full);
  const keyParts=parts.filter(p=>p.type==='key');
  const n=Math.min(BLANK_COUNT,keyParts.length);
  const blanked=new Set(shuffle(keyParts.map(p=>p.word)).slice(0,n));
  document.getElementById('q-num').textContent='Q'+(cur+1);
  document.getElementById('q-info').textContent=n+' blanks';
  document.getElementById('q-solve').textContent=(solveCount[cur]||0)===0?'0 clears':'✓ '+(solveCount[cur])+'x';
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('next-row').style.display='none';
  clearFb();
  const at=document.getElementById('a-text');at.innerHTML='';
  const wordCount={};
  parts.forEach(part=>{
    if(part.type==='text'){at.appendChild(document.createTextNode(part.content));}
    else{
      const w=part.word;wordCount[w]=(wordCount[w]||0)+1;
      const occ=wordCount[w];
      if(blanked.has(w)&&occ===1){
        const wrap=document.createElement('span');wrap.className='bw';
        const inp=document.createElement('input');inp.className='bw-inp';
        inp.dataset.word=w;inp.style.width=Math.max(64,w.length*10+16)+'px';
        inp.placeholder='?';inp.autocomplete='off';inp.autocorrect='off';
        inp.autocapitalize='none';inp.spellcheck=false;
        inp.addEventListener('input',()=>onInput(inp));
        inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=inp.value.trim().toLowerCase();const c=inp.dataset.word.toLowerCase();if(v!==''&&v!==c){inp.classList.add('bad');errSet.add(cur);buildGrid();setTimeout(()=>inp.classList.remove('bad'),320);}}});
        wrap.appendChild(inp);at.appendChild(wrap);
      }else{at.appendChild(document.createTextNode(w));}
    }
  });
  buildGrid();updateStats();
  setTimeout(()=>{const f=at.querySelector('.bw-inp');if(f)f.focus();},80);
}

function onInput(inp){
  const val=inp.value.trim().toLowerCase();
  const correct=inp.dataset.word.toLowerCase();
  if(val===correct){
    inp.classList.add('ok');inp.readOnly=true;
    const all=[...document.querySelectorAll('.bw-inp:not([readonly])')];
    if(all.length>0){all[0].focus();}
    else{onComplete();}
  }
}

function onComplete(){
  solveCount[cur]=(solveCount[cur]||0)+1;
  localStorage.setItem('py02_solve',JSON.stringify(solveCount));
  if(!hintSet.has(cur))perfects++;
  doneSet.add(cur);errSet.delete(cur);
  streak++;if(streak>best)best=streak;
  showFb('ok','All blanks correct! 🌸');
  document.getElementById('next-row').style.display='';
  document.getElementById('q-solve').textContent='✓ '+solveCount[cur]+'x';
  buildGrid();updateStats();
  if(doneSet.size===18)setTimeout(showFinish,900);
}

function showAns(){
  hintSet.add(cur);streak=0;
  document.querySelectorAll('.bw-inp').forEach(inp=>{
    if(!inp.readOnly){inp.value=inp.dataset.word;inp.classList.remove('ok');inp.classList.add('shown');inp.readOnly=true;}
  });
  showFb('info','Answers shown. Reset for new blanks.');
  document.getElementById('next-row').style.display='';
  buildGrid();updateStats();
}

function resetQ(){loadQ(cur);}
function nextQ(){if(cur<18-1)loadQ(cur+1);else showFinish();}
function goTo(i){if(i>=0&&i<=18-1)loadQ(i);}
function showFb(type,msg){const el=document.getElementById('fb');el.className='fb show '+type;el.textContent=msg;}
function clearFb(){const el=document.getElementById('fb');el.className='fb';el.textContent='';}

function buildGrid(){
  const g=document.getElementById('q-grid');g.innerHTML='';
  for(let i=0;i<18;i++){
    const b=document.createElement('button');
    b.className='qb'+(i===cur?' cur':'')+(doneSet.has(i)?' done':'')+(hintSet.has(i)&&!doneSet.has(i)?' hint':'')+(errSet.has(i)&&!doneSet.has(i)&&!hintSet.has(i)?' err':'');
    b.textContent=i+1;b.onclick=()=>goTo(i);g.appendChild(b);
  }
}

function updateStats(){
  document.getElementById('s-done').textContent=doneSet.size;
  document.getElementById('s-perf').textContent=perfects;
  document.getElementById('s-hint').textContent=hintSet.size;
  document.getElementById('s-best').textContent=best;
  document.getElementById('streak').textContent=streak;
  const pct=Math.round((doneSet.size/18)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=doneSet.size+' / 18';
}

function showFinish(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('finish').classList.add('show');
  const pct=Math.round((perfects/18)*100);
  document.getElementById('f-p').textContent=perfects;
  document.getElementById('f-h').textContent=hintSet.size;
  document.getElementById('f-b').textContent=best;
  document.getElementById('f-pct').textContent=pct+'%';
  document.getElementById('f-sub').textContent=pct>=90?'Outstanding! 🌸':pct>=70?"Good work! Keep drilling.":"Keep going — you've got this.";
}

function restart(){
  cur=0;streak=0;best=0;perfects=0;
  doneSet=new Set();hintSet=new Set();errSet=new Set();
  document.getElementById('quiz-area').style.display='';
  document.getElementById('finish').classList.remove('show');
  loadQ(0);updateStats();
}

function exportPNG(){
  const DPR=2;const cols=6,rows=Math.ceil(18/cols);
  const W=1080,pad=52,titleH=148;
  const gridW=W-pad*2,ch=160;
  const H=pad*2+titleH+rows*ch;
  const cw=gridW/cols;
  const canvas=document.createElement('canvas');
  canvas.width=W*DPR;canvas.height=H*DPR;
  const ctx=canvas.getContext('2d');ctx.scale(DPR,DPR);
  ctx.fillStyle='#f8f8fb';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,pad+titleH-8);
  ctx.textAlign='center';
  ctx.fillStyle='#1a1a2e';ctx.font='32px Georgia, serif';ctx.fillText('Python Lecture 02',W/2,pad+40);
  ctx.font='16px Georgia, serif';ctx.fillStyle='#7c6fff';ctx.fillText('Quiz Progress — Solve Count',W/2,pad+72);
  ctx.font='13px sans-serif';ctx.fillStyle='#999ab8';
  ctx.fillText(new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),W/2,pad+100);
  const div=ctx.createLinearGradient(pad,0,W-pad,0);
  div.addColorStop(0,'rgba(124,111,255,0)');div.addColorStop(.5,'rgba(124,111,255,0.35)');div.addColorStop(1,'rgba(124,111,255,0)');
  ctx.strokeStyle=div;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,pad+titleH-20);ctx.lineTo(W-pad,pad+titleH-20);ctx.stroke();
  const total=solveCount.reduce((a,b)=>a+(b||0),0);
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
      this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
      this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
    };
  }
  for(let i=0;i<18;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const gx=pad+col*cw,gy=pad+titleH+row*ch;
    const count=solveCount[i]||0,heat=Math.min(count/15,1);
    const inner=10,bx=gx+inner,by=gy+inner,bw=cw-inner*2,bh=ch-inner*2;
    ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=16;ctx.shadowOffsetY=4;
    if(count>0){const r=Math.round(245-heat*60),g2=Math.round(255-heat*20),b2=Math.round(245-heat*60);ctx.fillStyle=`rgb(${r},${g2},${b2})`;}
    else{ctx.fillStyle='#ffffff';}
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,12);ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.strokeStyle=count>0?`rgba(80,180,110,${0.4+heat*0.5})`:'#e2e2ee';ctx.lineWidth=count>0?1.5:1;ctx.stroke();
    const midX=gx+cw/2,midY=gy+ch/2;
    ctx.textAlign='center';
    ctx.fillStyle=count>0?'#1a4a30':'#6666aa';ctx.font='800 16px Arial Black, sans-serif';ctx.fillText('Q'+(i+1),midX,midY-28);
    ctx.fillStyle=count>0?'#0d2e1e':'#444466';ctx.font=`${count>=100?44:56}px Georgia, serif`;ctx.fillText(count,midX,midY+18);
    ctx.fillStyle=count>0?'#1a5c3a':'#6666aa';ctx.font='700 13px Arial, sans-serif';ctx.fillText('clears',midX,midY+42);
  }
  ctx.textAlign='center';ctx.fillStyle='#bbbbcc';ctx.font='12px sans-serif';
  ctx.fillText('Total clears: '+total+' · '+new Date().toLocaleTimeString(),W/2,H-20);
  const a=document.createElement('a');a.download='py02_progress_'+new Date().toISOString().slice(0,10)+'.png';
  a.href=canvas.toDataURL('image/png',1.0);a.click();
}

loadQ(0);
